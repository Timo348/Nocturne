services:
  nocturne:
    build: .
    image: timo348/nocturne:0.2.2
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: file:/data/nocturne.db
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Set APP_ENCRYPTION_KEY in .env}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@home.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_NAME: ${ADMIN_NAME:-Timo}
    volumes:
      - nocturne-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nocturne-data:
